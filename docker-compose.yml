services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: construction-budget-agent-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      AUTH_SECRET: ${AUTH_SECRET:-construction-budget-agent-v3-change-me}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-43200}
    volumes:
      - ./users.json:/app/users.json:ro
      - ./backend/storage/projects:/app/backend/storage/projects
      - ./backend/storage/outputs:/app/backend/storage/outputs
      - ./backend/storage/uploads:/app/backend/storage/uploads
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: construction-budget-agent-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped
